services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/stt_tts
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-}
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - ./storage:/app/storage
      - ./tmp:/app/tmp
    depends_on:
      - postgres
      - seaweedfs

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=stt_tts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: 'server -s3 -dir=/data -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json'
    ports:
      - "9333:9333"  # Master port
      - "8333:8333"  # S3 API port
      - "8081:8080"  # Volume port (mapped to 8081 to avoid conflict)
      - "18080:18080" # Filer port
    environment:
      - WEED_MASTER_VOLUME_SIZE_LIMIT_MB=1024
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    volumes:
      - seaweedfs_data:/data
      - ./storage/config/s3.json:/etc/seaweedfs/s3.json:ro

volumes:
  postgres_data:
  seaweedfs_data: